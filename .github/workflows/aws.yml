name: Remote SSH Command
on: [push]
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote SSH commands using password
        uses: appleboy/ssh-action@v1
        with:
          host: 13.223.80.129
          username: ubuntu
          password: ${{ secrets.SSH_KEY }}
          script: whoami
