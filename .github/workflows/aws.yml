name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1
        with:
          host: 13.223.80.129
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            whoami
            pwd
            ls -la
